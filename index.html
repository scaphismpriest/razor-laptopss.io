            width: 100px; height: auto; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--yellow));

        @keyframes flicker {
            0%, 100% { opacity: 1; }

        .card:hover { border-color: var(--yellow); box-shadow: var(--shadow); transform: translateY(-5px); }

            desc: "Dell Latitude 7490 — бізнес-ноутбук у міцному корпусі з металу та якісного пластику. Створений для щоденної работы, навчання та поїздок.\n\n🛠️ Обслужений, почищений від пилу, замінена термопаста.\n☑️ Гарантія 6 місяців.\n🔐 Windows 11 pro (ліцензія)\n\nХарактеристики\n💻 Процесор - Intel Core i7-8650U (4 ядра /8 потоків)\nМаксимальна частота 4.2GHz\n⚙️ Оперативна памʼять 16Gb\n📀 Ssd диск 256Gb nVmE (Можливість заміни на 512Gb)\n🎥 Відеокарта Intel UHD 620\n🖥️ Екран 14' дюймів HD матовий.\n⌨️ Клавіатура з підсвічуванням (UA).\n🔋 Акумулятор: до 7 годин. Зарядка Type-C від Power Bank.\n📦 Доставка: Нова пошта.\n💵 Ціна: Продано 💵", 
            imgs: ["9900.jpg", "9901.jpg", "9902.jpg", "9903.jpg", "9904.jpg", "9905.jpg"] 
        }
    ];

    let currentCat = 'all';
    let currentImgIdx = 0;
    let currentModalImgs = [];

    function renderProducts() {
        const main = document.getElementById('main-content');
        const search = document.getElementById('search-input').value.toLowerCase();
        
        const filtered = products.filter(p => {
            const matchesCat = (currentCat === 'all' || p.category === currentCat);
            const matchesSearch = p.name.toLowerCase().includes(search);
            return matchesCat && matchesSearch;
        });

        if (filtered.length === 0) {
            main.innerHTML = `<p style="text-align:center; padding:50px; color:var(--gray);">ОБ'ЄКТІВ НЕ ЗНАЙДЕНО В БАЗІ ДАНИХ</p>`;
            return;
        }

        main.innerHTML = `<div class="grid">${filtered.map(p => `
            <div class="card ${p.soldOut ? 'sold-out' : ''}" onclick="openDetails(${p.id})">
                ${p.soldOut ? '<div class="sold-out-ribbon">немає в наявності</div>' : ''}
                <div class="slider-container">
                    <div class="slide" style="background-image:url('img/${p.imgs[0]}')"></div>
                </div>
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toLocaleString()}${typeof p.price === 'number' ? ' грн.' : ''}</div>
                    <button class="btn">${p.soldOut ? 'ОГЛЯНУТИ ХАРАКТЕРИСТИКИ' : 'ДЕТАЛЬНИЙ ЗВІТ'}</button>
                </div>
            </div>
        `).join('')}</div>`;

        setTimeout(() => {
            document.querySelectorAll('.card').forEach((c, i) => {
                setTimeout(() => c.classList.add('show'), i * 60);
            });
        }, 50);
    }

    function openDetails(id) {
        const p = products.find(x => x.id === id);
        if(!p) return;
        
        currentModalImgs = p.imgs; 
        currentImgIdx = 0;
        
        document.getElementById('modal-title').innerText = p.name;
        document.getElementById('modal-price').innerText = p.price.toLocaleString() + (typeof p.price === 'number' ? " грн." : "");
        document.getElementById('modal-desc').innerText = p.desc;

        const buyBtn = document.getElementById('buy-btn');
        if(p.soldOut) {
            buyBtn.innerText = "ТОВАР ПРОДАНО";
            buyBtn.style.animation = "none";
            buyBtn.style.background = "#444";
            buyBtn.style.color = "#888";
            buyBtn.onclick = (e) => e.stopPropagation();
        } else {
            buyBtn.innerText = "ЗАМОВИТИ В TELEGRAM";
            buyBtn.style.animation = "danger-pulse 2s infinite";
            buyBtn.style.background = "var(--yellow)";
            buyBtn.style.color = "black";
            buyBtn.onclick = (e) => {
                e.stopPropagation();
                tg.openTelegramLink(`https://t.me/LaPtoPs_UA8?text=${encodeURIComponent("Доброго дня/вечора, цікавить модель: " + p.name)}`);
            };
        }

        updateModalImg();
        const m = document.getElementById('item-modal');
        m.style.display = 'flex'; 
        setTimeout(() => m.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const m = document.getElementById('item-modal');
        m.classList.remove('active');
        setTimeout(() => { 
            m.style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }, 400);
    }

    function updateModalImg() { 
        document.getElementById('modal-img-view').style.backgroundImage = `url('img/${currentModalImgs[currentImgIdx]}')`; 
    }

    function changeModalImg(dir) { 
        currentImgIdx = (currentImgIdx + dir + currentModalImgs.length) % currentModalImgs.length; 
        updateModalImg(); 
    }

    function setCategory(cat) { 
        currentCat = cat; 
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); 
        const activeBtn = document.getElementById('btn-' + cat);
        if(activeBtn) activeBtn.classList.add('active');
        renderProducts(); 
    }

    function filterProducts() { 
        renderProducts(); 
    }

    function showCatalog() { 
        document.getElementById('catalog-controls').style.display = 'block'; 
        renderProducts(); 
    }
    
    function showAbout() {
        document.getElementById('catalog-controls').style.display = 'none';
        const main = document.getElementById('main-content');
        main.innerHTML = `
            <div style="max-width:800px; margin:40px auto; animation: fadeIn 0.8s ease; padding: 0 15px;">
                <h2 style="color:var(--yellow); margin-bottom:30px; text-align:center; text-transform:uppercase;">LAPTOPS:</h2>
                <div style="background:#111; padding:35px; border:1px solid #333; border-left: 8px solid var(--yellow); line-height:1.8;">
                    <p>LAPTOPS — це не просто магазин. Це хаб перевіреної техніки з Європи та США. Ми спеціалізуємося на професійних лінійках (ThinkPad, Latitude, EliteBook).</p>
                    <br>
                    <p>Кожен пристрій проходить повний цикл підготовки:</p>
                    <ul style="margin: 15px 0 15px 25px; color: var(--yellow);">
                        <li>Глибоке очищення</li>
                        <li>Заміна термоінтерфейсу</li>
                        <li>Тестування</li>
                    </ul>
                    <p>Зв'язок з адміністратором: <strong>@LaPtoPs_UA8</strong></p>
                    <p>Або бот в TELEGRAM: <strong>@Laptopsu_bot</strong></p>
                    <button class="btn" style="margin-top:30px; width:220px;" onclick="setCategory('all')">ПОВЕРНУТИСЬ В БАЗУ</button>
                </div>
            </div>`;
    }

    function toggleSchedule(show) {
        const m = document.getElementById('schedule-modal');
        if(show) { 
            m.style.display = 'flex'; 
            setTimeout(() => m.classList.add('active'), 10); 
        } else { 
            m.classList.remove('active'); 
            setTimeout(() => m.style.display = 'none', 400); 
        }
    }

    window.onload = renderProducts;
</script>
</body>
</html>
